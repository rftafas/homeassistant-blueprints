blueprint:
  name: N-Way Interrupts
  description: Sets multiple switches to control a light entity.
  domain: automation
  author: rftafas
  homeassistant:
    min_version: "2024.6.0"

  input:
    main_config:
      name: Main Configuration
      description: Core configuration
      collapsed: false
      input:
        trigger_entities:
          name: Switches
          description: Multiple switches to control the light
          selector:
            entity:
              domain: switch
              multiple: true
        light_target:
          name: Light
          description: Light entity to control
          selector:
            entity:
              domain: light

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input trigger_entities
    from:
      - "on"
    to:
      - "off"
  - platform: state
    entity_id: !input trigger_entities
    from:
      - "off"
    to:
      - "on"

condition: []

action:
  - service: light.toggle
    target:
      entity_id: !input light_target
