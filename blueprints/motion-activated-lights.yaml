blueprint:
  name: Motion Activated Lights
  description: >
    Turn lights on/off from one motion, occupancy, or presence sensor.
    Day/night enable control when motion turns lights on. Auto-off turns them
    off when the room is empty. Day savings force-offs lights left on after 1 minute.
    Threshold 0 = immediate. Combine sensors with a template binary_sensor if needed.

  domain: automation
  author: rftafas
  homeassistant:
    min_version: "2024.6.0"

  input:
    main_config:
      name: Main Configuration
      description: Sensor and lights
      collapsed: false
      input:
        motion_sensor:
          name: Motion sensor
          description: >
            One binary_sensor (motion, occupancy, or presence). Combine multiple
            sensors with a template binary_sensor first.
          selector:
            entity:
              filter:
                - domain: binary_sensor
                  device_class:
                    - motion
                    - occupancy
                    - presence

        light_targets:
          name: Lights
          description: Lights turned on and off together.
          selector:
            entity:
              multiple: true
              filter:
                domain: light

    detector_config:
      name: Behavior
      description: Day/night auto-on, auto-off, and day savings
      collapsed: false
      input:
        day_enable:
          name: Day enable
          description: Auto on by motion while the sun is up.
          default: true
          selector:
            boolean: {}

        night_enable:
          name: Night enable
          description: Auto on by motion while the sun is down.
          default: true
          selector:
            boolean: {}

        enable_turn_off:
          name: Auto-off enable
          description: Turn lights off after the sensor is clear for the off threshold.
          default: true
          selector:
            boolean: {}

        save_energy_during_day:
          name: Day savings enable
          description: Turn lights off after 1 minute while the sun is up.
          default: false
          selector:
            boolean: {}

    threshold_config:
      name: Timing
      description: 0 = immediate
      collapsed: true
      input:
        turn_on_threshold:
          name: Turn-on threshold
          description: How long the sensor must stay on before lights turn on.
          default:
            hours: 0
            minutes: 0
            seconds: 0
          selector:
            duration: {}

        turn_off_threshold:
          name: Turn-off threshold
          description: How long the sensor must stay off before lights turn off.
          default:
            hours: 0
            minutes: 2
            seconds: 0
          selector:
            duration: {}

mode: restart
max_exceeded: silent

variables:
  day_enable: !input day_enable
  night_enable: !input night_enable

trigger:
  - trigger: state
    entity_id: !input motion_sensor
    to: "on"
    for: !input turn_on_threshold
    id: detect_on

  - trigger: state
    entity_id: !input motion_sensor
    to: "off"
    for: !input turn_off_threshold
    enabled: !input enable_turn_off
    id: detect_off

  - trigger: state
    entity_id: !input light_targets
    to: "on"
    for:
      minutes: 1
    enabled: !input save_energy_during_day
    id: day_force_off

condition: []

action:
  - choose:
      - conditions:
          - condition: trigger
            id: day_force_off
          - condition: state
            entity_id: sun.sun
            state: above_horizon
        sequence:
          - action: light.turn_off
            target:
              entity_id: !input light_targets

      - conditions:
          - condition: trigger
            id: detect_on
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: state
                    entity_id: sun.sun
                    state: above_horizon
                  - condition: template
                    value_template: "{{ day_enable }}"
              - condition: and
                conditions:
                  - condition: state
                    entity_id: sun.sun
                    state: below_horizon
                  - condition: template
                    value_template: "{{ night_enable }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_targets

      - conditions:
          - condition: trigger
            id: detect_off
        sequence:
          - action: light.turn_off
            target:
              entity_id: !input light_targets
