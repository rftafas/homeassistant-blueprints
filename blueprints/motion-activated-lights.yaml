blueprint:
  name: Motion Activated Lights
  description: >
    Turn on multiple lights when any motion sensor detects movement, and turn them
    off after all sensors have been clear for a configurable timeout.

    Create two input_boolean helpers — one to enable automation during the day and
    one for the night. Day mode is active when the sun is above the horizon and the
    day helper is on; night mode uses the night helper when the sun is below the horizon.

    Uses restart mode: each new motion event cancels the in-progress timeout and
    starts a fresh run from the beginning.

    Assumptions:
    - Motion sensors are binary_sensor entities with on/off states.
    - Day and night are determined by sun position, not fixed clock hours.
    - All selected lights turn on and off together as one zone.

  domain: automation
  author: rftafas
  homeassistant:
    min_version: "2024.6.0"

  input:
    main_config:
      name: Main Configuration
      description: Motion sensors, lights, and day/night enable helpers
      collapsed: false
      input:
        motion_sensors:
          name: Motion sensors
          description: >
            Any sensor going to on will trigger the automation. Supports PIR motion
            and mmWave occupancy sensors.
          selector:
            entity:
              multiple: true
              filter:
                - domain: binary_sensor
                  device_class:
                    - motion
                    - occupancy

        light_targets:
          name: Lights
          description: All selected lights are turned on and off together.
          selector:
            entity:
              multiple: true
              filter:
                domain: light

        day_enable:
          name: Enable during day
          description: >
            input_boolean helper. Active when the sun is above the horizon and this
            helper is on.
          selector:
            entity:
              filter:
                domain: input_boolean

        night_enable:
          name: Enable during night
          description: >
            input_boolean helper. Active when the sun is below the horizon and this
            helper is on.
          selector:
            entity:
              filter:
                domain: input_boolean

    threshold_config:
      name: Timing
      description: No-motion timeout before turning lights off
      collapsed: true
      input:
        no_motion_timeout:
          name: No-motion timeout
          description: Turn lights off after all sensors have been off for this long.
          default:
            hours: 0
            minutes: 2
            seconds: 0
          selector:
            duration: {}

mode: restart
max_exceeded: silent

variables:
  motion_sensors: !input motion_sensors

trigger:
  - trigger: state
    entity_id: !input motion_sensors
    to: "on"

condition:
  - condition: or
    conditions:
      - condition: and
        conditions:
          - condition: state
            entity_id: sun.sun
            state: above_horizon
          - condition: state
            entity_id: !input day_enable
            state: "on"
      - condition: and
        conditions:
          - condition: state
            entity_id: sun.sun
            state: below_horizon
          - condition: state
            entity_id: !input night_enable
            state: "on"

action:
  - action: light.turn_on
    target:
      entity_id: !input light_targets

  - wait_for_trigger:
      - trigger: template
        value_template: >
          {{ expand(motion_sensors) | selectattr('state', 'eq', 'on') | list | count == 0 }}
        for: !input no_motion_timeout

  - action: light.turn_off
    target:
      entity_id: !input light_targets
