blueprint:
  name: Soil Moisture Irrigation
  description: >
    Once-daily irrigation with an optional manual trigger. At the configured
    time each day the automation evaluates soil and weather gates in sequence;
    if every gate passes it irrigates. When the optional manual trigger turns
    ON, irrigation runs immediately and skips all gates.

    Soil signal: pick exactly one check (moisture, accumulated rain in mm,
    accumulated rain duration, or an every-X-days fallback). Weather gates skip
    scheduled runs if it is raining now or if any checked forecast day is rainy.
    An optional wind gate waits for calmer conditions before irrigating.

    Assumptions:
    - One irrigation zone; all selected valves and pumps act together.
    - One evaluation per trigger event.

  domain: automation
  author: rftafas
  homeassistant:
    min_version: "2024.6.0"

  input:
    irrigation_trigger_execution:
      name: Trigger and execution
      description: When irrigation runs and how it completes.
      collapsed: true
      input:
        activation_time:
          name: Schedule
          description: Local time when irrigation is evaluated once per day.
          default: "06:00:00"
          selector:
            time: {}

        manual_trigger:
          name: Manual trigger (optional)
          description: >
            NO: scheduled runs only. YES: pick a binary_sensor or input_boolean;
            turning it ON runs irrigation immediately, skipping all checks.
          default:
            active_choice: "NO"
          selector:
            choose:
              choices:
                "NO":
                  selector:
                    constant:
                      value: false
                      label: Scheduled runs only — no manual trigger
                "YES":
                  selector:
                    entity:
                      filter:
                        - domain: binary_sensor
                        - domain: input_boolean

        irrigation_duration:
          name: Irrigation duration
          description: How long valves and pumps stay on before shutting down.
          default:
            hours: 0
            minutes: 10
            seconds: 0
          selector:
            duration: {}

    soil_config:
      name: Soil
      description: Pick one soil signal and its settings.
      collapsed: true
      input:
        soil_signal:
          name: Soil signal
          description: >
            Select how the condition of the soil is checked. Only the chosen
            option's fields are used; the others can be left empty.
          default:
            active_choice: timeout
            timeout: 3
          selector:
            choose:
              choices:
                moisture:
                  selector:
                    object:
                      fields:
                        entity:
                          label: Moisture sensor
                          selector:
                            entity:
                              filter:
                                - domain: sensor
                                - domain: input_number
                        threshold:
                          label: Irrigate when below (%)
                          selector:
                            number:
                              min: 0
                              max: 100
                              unit_of_measurement: "%"
                              mode: slider
                rain_mm:
                  selector:
                    object:
                      fields:
                        entity:
                          label: Rain sensor
                          selector:
                            entity:
                              filter:
                                - domain: sensor
                                - domain: input_number
                        threshold:
                          label: Skip at or above (mm)
                          selector:
                            number:
                              min: 0
                              max: 500
                              unit_of_measurement: mm
                              mode: box
                rain_hours:
                  selector:
                    object:
                      fields:
                        entity:
                          label: Rain duration sensor
                          selector:
                            entity:
                              filter:
                                - domain: sensor
                                - domain: input_number
                        threshold:
                          label: Skip at or above
                          selector:
                            duration: {}
                timeout:
                  selector:
                    number:
                      min: 1
                      max: 14
                      unit_of_measurement: days
                      mode: box

    weather_config:
      name: Weather
      description: Weather entity, forecast gate, and wind wait.
      collapsed: true
      input:
        weather_entity:
          name: Weather entity
          description: >
            Required. Weather entity used for present conditions, wind, and the
            daily forecast. Defaults to weather.forecast_home (the standard
            Home Assistant entity).
          default: weather.forecast_home
          selector:
            entity:
              domain: weather

        forecast_dry_days:
          name: Forecast days to check
          description: >
            How many forecast days to inspect, starting from today. If any
            checked day has a rainy condition, irrigation is skipped.
            0 = today only. 1 = today and tomorrow. 2 = today + next 2 days.
          default: 0
          selector:
            number:
              min: 0
              max: 7
              step: 1
              unit_of_measurement: days
              mode: box

        enable_wind_wait:
          name: Enable wind wait
          description: >
            When ON, pause before irrigating if wind is at or above the
            threshold, up to the configured wait timeout. When OFF, start
            immediately.
          default: true
          selector:
            boolean: {}

        wind_speed_threshold:
          name: Max wind speed
          description: >
            When wind speed from the weather entity is at or above this value
            (m/s), wait for calmer conditions before irrigating.
          default: 8
          selector:
            number:
              min: 0
              max: 50
              unit_of_measurement: m/s
              mode: box

        wind_wait_timeout:
          name: Wind wait timeout
          description: >
            Maximum time to wait for wind to drop. If still too windy
            afterward, irrigation is skipped.
          default:
            hours: 1
            minutes: 0
            seconds: 0
          selector:
            duration: {}

    actuators_config:
      name: Actuators
      description: Valves (required) and optional pumps.
      collapsed: true
      input:
        valve_entities:
          name: Valves
          description: >
            At least one irrigation valve (switch or valve entity) is required.
          selector:
            entity:
              multiple: true
              filter:
                - domain:
                    - switch
                    - valve

        pump_entities:
          name: Pumps (optional)
          description: Optional irrigation pumps (switch or valve entities).
          default: []
          selector:
            entity:
              multiple: true
              filter:
                - domain:
                    - switch
                    - valve

    notification_config:
      name: Notification
      description: Optional completion notification.
      collapsed: true
      input:
        notify_targets:
          name: Notification targets (optional)
          description: >
            Optional companion-app notify entities (notify.mobile_app_*). Leave
            empty to disable notifications.
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: notify
                integration: mobile_app

mode: single
max_exceeded: silent

trigger_variables:
  manual_trigger: !input manual_trigger

variables:
  soil_signal: !input soil_signal
  weather_entity: !input weather_entity
  forecast_dry_days: !input forecast_dry_days
  wind_speed_threshold: !input wind_speed_threshold
  pump_entities: !input pump_entities
  notify_targets: !input notify_targets
  rainy_set:
    - rainy
    - pouring
    - lightning-rainy
    - hail
    - snowy-rainy
    - snowy

trigger:
  - trigger: time
    at: !input activation_time
    id: scheduled
  - trigger: template
    value_template: |
      {% if manual_trigger.active_choice == 'YES' %}
        {{ is_state(manual_trigger.YES, 'on') }}
      {% else %}
        false
      {% endif %}
    id: manual

action:
  # ── Scheduled run: evaluate gates. Manual run: skip straight to irrigation ──
  - if:
      - condition: trigger
        id: scheduled
    then:
      # ── Soil gate: stop if soil does not need water ──
      - if:
          - condition: not
            conditions:
              - condition: template
                value_template: |
                  {% set sig = soil_signal %}
                  {% if sig.active_choice == 'moisture' %}
                    {% set cfg = sig.moisture | default({}) %}
                    {% set e = cfg.entity | default('') | string | trim %}
                    {{ e != '' and states(e) | float(100) < cfg.threshold | float(25) }}
                  {% elif sig.active_choice == 'rain_mm' %}
                    {% set cfg = sig.rain_mm | default({}) %}
                    {% set e = cfg.entity | default('') | string | trim %}
                    {{ e != '' and states(e) | float(999) < cfg.threshold | float(10) }}
                  {% elif sig.active_choice == 'rain_hours' %}
                    {% set cfg = sig.rain_hours | default({}) %}
                    {% set e = cfg.entity | default('') | string | trim %}
                    {% set t = cfg.threshold | default({}) %}
                    {% set threshold_h = (t.hours | default(0) | int)
                      + (t.minutes | default(0) | int) / 60
                      + (t.seconds | default(0) | int) / 3600 %}
                    {{ e != '' and states(e) | float(999) < threshold_h }}
                  {% elif sig.active_choice == 'timeout' %}
                    {{ (now().day % (sig.timeout | int(3))) == 0 }}
                  {% else %}
                    false
                  {% endif %}
        then:
          - stop: "Soil does not need water"

      # ── Fetch daily forecast (init first so the failure path is safe) ──
      - variables:
          wx_daily: {}
      - action: weather.get_forecasts
        target:
          entity_id: !input weather_entity
        data:
          type: daily
        response_variable: wx_daily
        continue_on_error: true

      # ── Weather gate: stop if raining now or any checked forecast day is wet ──
      - if:
          - condition: or
            conditions:
              - condition: state
                entity_id: !input weather_entity
                state:
                  - rainy
                  - pouring
                  - lightning-rainy
                  - hail
                  - snowy-rainy
                  - snowy
              - condition: template
                value_template: >-
                  {% set ns = namespace(wet=false) %}
                  {% if wx_daily is mapping and weather_entity in wx_daily %}
                  {% for f in (wx_daily[weather_entity].forecast | default([]))[: (forecast_dry_days | int(0)) + 1] %}
                  {% if f.condition | default('') | lower in rainy_set %}
                  {% set ns.wet = true %}
                  {% endif %}
                  {% endfor %}
                  {% endif %}
                  {{ ns.wet }}
        then:
          - stop: "Weather is or will be wet"

      # ── Wind gate: continue when calm now or once wind drops; stop if still windy at timeout ──
      - wait_template: "{{ (state_attr(weather_entity, 'wind_speed') | float(0)) < (wind_speed_threshold | float(0)) }}"
        timeout: !input wind_wait_timeout
        continue_on_timeout: false
        enabled: !input enable_wind_wait

  # ── Irrigate ──
  - action: homeassistant.turn_on
    target:
      entity_id: !input valve_entities
  - if:
      - condition: template
        value_template: "{{ pump_entities | count > 0 }}"
    then:
      - delay:
          seconds: 5
      - action: homeassistant.turn_on
        target:
          entity_id: "{{ pump_entities }}"
  - delay: !input irrigation_duration
  - if:
      - condition: template
        value_template: "{{ pump_entities | count > 0 }}"
    then:
      - action: homeassistant.turn_off
        target:
          entity_id: "{{ pump_entities }}"
  - action: homeassistant.turn_off
    target:
      entity_id: !input valve_entities

  # ── Log ──
  - action: system_log.write
    data:
      message: "Soil Moisture Irrigation: irrigation completed"
      level: info

  # ── Notify (templated target + guard, safe when empty) ──
  - if:
      - condition: template
        value_template: "{{ notify_targets | count > 0 }}"
    then:
      - action: notify.send_message
        target:
          entity_id: "{{ notify_targets }}"
        data:
          title: Soil Moisture Irrigation
          message: >-
            Irrigation completed at {{ as_local(now()).strftime('%Y-%m-%d %H:%M') }}.
