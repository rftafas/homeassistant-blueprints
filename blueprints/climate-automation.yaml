blueprint:
  name: Simple Climate Control
  description: >
    Reactive day/night climate for one or more HVAC entities: daytime comfort bands (4 °C), nighttime mode from a forecast temperature, optional presence and openings, and a single idempotent apply per run.

    - **Day:** setpoint-driven cool/heat/auto and fan bands


    - **Night:** forecast vs night setpoint (cool / auto / heat)


    - **Triggers:** room and outdoor temperature, presence/windows, HVAC changes, optional manual re-evaluation helper


    - **Optional:** day/night enable helpers, manual lock after user HVAC changes (see Presence section)
  domain: automation
  author: rftafas
  homeassistant:
    min_version: "2024.6.0"

  input:
    main_config:
      name: Main Configuration
      description: HVAC targets and optional manual re-evaluation.
      collapsed: true
      input:
        hvac_entity:
          name: HVAC Entity
          description: >
            One or more climate entities; each run applies the same mode, target temperature, and fan mode.
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: climate

        manual_trigger:
          name: Manual trigger (optional)
          description: >
            Re-run climate logic from current state when a helper turns on.

            - **NO:** automatic triggers only


            - **YES:** `input_boolean` or `binary_sensor` — ON forces a run
          default:
            active_choice: "NO"
          selector:
            choose:
              choices:
                "NO":
                  selector:
                    constant:
                      value: false
                      label: Automatic triggers only
                "YES":
                  selector:
                    entity:
                      filter:
                        - domain: binary_sensor
                        - domain: input_boolean

    temperature_config:
      name: Temperature sensors
      description: Indoor and outdoor sources, ventilation band, and forecast.
      collapsed: true
      input:
        room_temperature_sensors:
          name: Indoor temperature sensors
          description: >
            Averaged for daytime comfort bands and logic.

            - **Domains:** `sensor`, `number` (not `input_number`)


            - **Required:** one or more entities
          default: []
          selector:
            entity:
              multiple: true
              filter:
                - domain: sensor
                - domain: number

        outside_temperature_sensors:
          name: Outdoor temperature sensors
          description: >
            Averaged for the window ventilation band (±2 °C from day setpoint).

            - **Domains:** `sensor`, `number` (not `input_number`)


            - **Required:** one or more entities
          default: []
          selector:
            entity:
              multiple: true
              filter:
                - domain: sensor
                - domain: number

        forecast:
          name: Forecast
          description: >
            Compared to the night setpoint for nighttime cool / auto / heat mode.

            - **average:** HVAC region's average temperature (default)


            - **forecast:** temperature sensor with the average forecast for the next 8 hours (e.g. template sensor from `scratch/forecast-temperature-average-sensor.yaml` with `forecast_hours: 8`)
          default:
            active_choice: "average"
            average: 24
          selector:
            choose:
              choices:
                average:
                  selector:
                    number:
                      min: -30
                      max: 50
                      unit_of_measurement: °C
                      mode: box
                forecast:
                  selector:
                    entity:
                      filter:
                        - domain: sensor
                          device_class: temperature
                        - domain: number

    presence_config:
      name: Presence
      description: Optional presence routing and manual lock after user HVAC changes.
      collapsed: true
      input:
        occupation_sensor:
          name: Room occupation sensor (optional)
          description: >
            Gates day/night climate and can turn HVAC off after unoccupied duration. Any presence entity state change re-evaluates the run.


            - **NO:** no presence-based routing


            - **YES:** presence or occupancy entity and unoccupied duration before HVAC off
          default:
            active_choice: "NO"
            YES:
              presence_unoccupied_duration:
                hours: 0
                minutes: 10
                seconds: 0
          selector:
            choose:
              choices:
                "NO":
                  selector:
                    constant:
                      value: false
                      label: No presence sensor
                "YES":
                  selector:
                    object:
                      fields:
                        entity:
                          label: Presence / occupancy entity
                          selector:
                            entity:
                              filter:
                                - domain: binary_sensor
                                  device_class:
                                    - presence
                                    - occupancy
                                - domain: input_boolean
                        presence_unoccupied_duration:
                          label: Unoccupied duration before HVAC off
                          selector:
                            duration: {}

        manual_lock:
          name: Manual lock
          description: >
            When ON, a user change to HVAC mode, target temperature, or fan pauses
            automatic climate on that trigger.

            - **With presence sensor:** waits up to 4 hours or until the room is
              unoccupied (whichever comes first).


            - **Without presence sensor:** waits the full 4 hours (no early exit).
          default: true
          selector:
            boolean: {}

    windows_config:
      name: Windows and doors
      description: Optional opening sensors and ventilation suspend while open.
      collapsed: true
      input:
        windows_sensors:
          name: Windows / doors (optional)
          description: >
            While any opening is reported open, HVAC uses ventilation band or
            off and day/night logic is skipped until all are closed. Use sensors
            whose state already reflects when you want action (debounce/delay
            on the device).

            Sensor convention: **off** = closed, **on** = open.

            - **NO:** no window-based routing


            - **YES:** pick opening sensors (debounce/delay on the sensor if needed)
          default:
            active_choice: "NO"
          selector:
            choose:
              choices:
                "NO":
                  selector:
                    constant:
                      value: false
                      label: No window sensors
                "YES":
                  selector:
                    object:
                      fields:
                        sensors:
                          label: Window / door sensors
                          selector:
                            entity:
                              multiple: true
                              filter:
                                domain: binary_sensor

    day_config:
      name: Day
      description: Daytime enable, boundary, and setpoint.
      collapsed: true
      input:
        daytime_auto_climate_enable:
          name: Daytime enable helper (optional)
          description: >
            Gate daytime reactive logic without removing the automation.

            - **NO:** daytime climate always runs


            - **YES:** `input_boolean` or `binary_sensor` — when off, daytime bands are skipped and HVAC is left unchanged
          default:
            active_choice: "NO"
          selector:
            choose:
              choices:
                "NO":
                  selector:
                    constant:
                      value: false
                      label: Always enabled — no helper
                "YES":
                  selector:
                    entity:
                      filter:
                        - domain: binary_sensor
                        - domain: input_boolean

        day_boundary:
          name: Day boundary
          description: >
            When daytime begins (night ends). Independent of night boundary.

            - **sun:** sunrise (sun is above horizon)


            - **fixed:** clock time when day starts
          default:
            active_choice: "sun"
          selector:
            choose:
              choices:
                sun:
                  selector:
                    constant:
                      value: true
                      label: Sunrise
                fixed:
                  selector:
                    object:
                      fields:
                        time:
                          label: Day begins
                          selector:
                            time: {}

        day_set_point:
          name: Day setpoint
          description: >
            Target for daytime comfort bands and ventilation reference. External entity changes trigger re-evaluation.

            - **fixed:** slider (18–30 °C)


            - **external:** `input_number` entity
          default:
            active_choice: "fixed"
            fixed: 24
          selector:
            choose:
              choices:
                fixed:
                  selector:
                    number:
                      min: 18
                      max: 30
                      unit_of_measurement: °C
                      mode: slider
                external:
                  selector:
                    entity:
                      filter:
                        domain: input_number

    night_config:
      name: Night
      description: Nighttime enable, boundary, and setpoint.
      collapsed: true
      input:
        nighttime_auto_climate_enable:
          name: Nighttime enable helper (optional)
          description: >
            Gate nighttime mode selection without removing the automation.

            - **NO:** nighttime climate always runs


            - **YES:** `input_boolean` or `binary_sensor` — when off, night logic is skipped and HVAC is left unchanged
          default:
            active_choice: "NO"
          selector:
            choose:
              choices:
                "NO":
                  selector:
                    constant:
                      value: false
                      label: Always enabled — no helper
                "YES":
                  selector:
                    entity:
                      filter:
                        - domain: binary_sensor
                        - domain: input_boolean

        night_set_point:
          name: Night setpoint
          description: >
            Compared to forecast temperature for nighttime cool / auto / heat. External entity changes trigger re-evaluation.

            - **day_copy:** use daytime setpoint


            - **fixed:** slider (18–30 °C)


            - **external:** temperature `sensor`, `number`, or `input_number`
          default:
            active_choice: "day_copy"
            fixed: 24
          selector:
            choose:
              choices:
                day_copy:
                  selector:
                    constant:
                      value: true
                      label: Day setpoint copy
                fixed:
                  selector:
                    number:
                      min: 18
                      max: 30
                      unit_of_measurement: °C
                      mode: slider
                external:
                  selector:
                    entity:
                      filter:
                        - domain: sensor
                          device_class: temperature
                        - domain: number
                        - domain: input_number

        night_boundary:
          name: Night boundary
          description: >
            When nighttime begins (day ends). Independent of day boundary.

            - **sun:** sunset (below horizon)


            - **fixed:** clock time when night starts
          default:
            active_choice: "sun"
          selector:
            choose:
              choices:
                sun:
                  selector:
                    constant:
                      value: true
                      label: Sunset
                fixed:
                  selector:
                    object:
                      fields:
                        time:
                          label: Night begins
                          selector:
                            time: {}

mode: single
max_exceeded: silent

trigger_variables:
  day_set_point: !input day_set_point
  night_set_point: !input night_set_point
  manual_trigger: !input manual_trigger
  occupation_sensor: !input occupation_sensor
  windows_sensors: !input windows_sensors
  daytime_auto_climate_enable: !input daytime_auto_climate_enable
  nighttime_auto_climate_enable: !input nighttime_auto_climate_enable

variables:
  # Entities from inputs as variables
  hvac_entity: !input hvac_entity
  room_temperature_sensors: !input room_temperature_sensors
  outside_temperature_sensors: !input outside_temperature_sensors
  forecast: !input forecast
  occupation_sensor: !input occupation_sensor
  windows_sensors: !input windows_sensors
  day_set_point: !input day_set_point
  day_boundary: !input day_boundary
  night_boundary: !input night_boundary
  night_set_point: !input night_set_point
  daytime_auto_climate_enable: !input daytime_auto_climate_enable
  nighttime_auto_climate_enable: !input nighttime_auto_climate_enable
  manual_lock: !input manual_lock
  # Helpers and variables
  daytime_auto_climate_enabled: >
    {% if daytime_auto_climate_enable.active_choice == 'YES' %}
      {{ is_state(daytime_auto_climate_enable.YES, 'on') }}
    {% else %}
      {{ true }}
    {% endif %}
  nighttime_auto_climate_enabled: >
    {% if nighttime_auto_climate_enable.active_choice == 'YES' %}
      {{ is_state(nighttime_auto_climate_enable.YES, 'on') }}
    {% else %}
      {{ true }}
    {% endif %}
  setpoint: >
    {% if day_set_point.active_choice == 'fixed' %}
      {{ day_set_point.fixed | float(24) }}
    {% else %}
      {{ states(day_set_point.external) | float(24) }}
    {% endif %}
  room_temp: >
    {% set ns = namespace(values=[]) %}
    {% for e in expand(room_temperature_sensors) %}
      {% if e.state not in ['unavailable', 'unknown', 'none', ''] %}
        {% set v = e.state | float(none) %}
        {% if v is number %}
          {% set ns.values = ns.values + [v] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.values | sum) / (ns.values | length) if ns.values | length > 0 else 0 }}
  outside_temp: >
    {% set ns = namespace(values=[]) %}
    {% for e in expand(outside_temperature_sensors) %}
      {% if e.state not in ['unavailable', 'unknown', 'none', ''] %}
        {% set v = e.state | float(none) %}
        {% if v is number %}
          {% set ns.values = ns.values + [v] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.values | sum) / (ns.values | length) if ns.values | length > 0 else 0 }}
  forecast_temp: >
    {% if forecast.active_choice == 'average' %}
      {{ forecast.average | float(24) }}
    {% else %}
      {% set v = states(forecast.forecast) %}
      {% if v in ['unavailable', 'unknown', 'none', ''] %}
        {{ 0 }}
      {% else %}
        {{ v | float(0) }}
      {% endif %}
    {% endif %}
  any_window_open: >
    {% if windows_sensors.active_choice == 'YES' %}
      {% set ns = namespace(found=false) %}
      {% for e in expand(windows_sensors.YES.sensors) %}
        {% if e.state == 'on' %}
          {% set ns.found = true %}
        {% endif %}
      {% endfor %}
      {{ ns.found }}
    {% else %}
      {{ false }}
    {% endif %}
  room_unoccupied: >
    {% if occupation_sensor.active_choice == 'YES' %}
      {% set entity = occupation_sensor.YES.entity %}
      {% set d = occupation_sensor.YES.presence_unoccupied_duration %}
      {% set duration = timedelta(days=d.days | default(0) | int, hours=d.hours | default(0) | int, minutes=d.minutes | default(0) | int, seconds=d.seconds | default(0) | int) %}
      {{ is_state(entity, 'off') and (now() - states[entity].last_changed) >= duration }}
    {% else %}
      {{ false }}
    {% endif %}
  is_day: >
    {% if day_boundary.active_choice == 'sun' %}
      {% set day_ok = is_state('sun.sun', 'above_horizon') %}
    {% else %}
      {% set day_ok = now() >= today_at(day_boundary.fixed.time) %}
    {% endif %}
    {% if night_boundary.active_choice == 'sun' %}
      {% set night_ok = is_state('sun.sun', 'above_horizon') %}
    {% else %}
      {% set night_ok = now() < today_at(night_boundary.fixed.time) %}
    {% endif %}
    {{ day_ok and night_ok }}
  night_setpoint: >
    {% if night_set_point.active_choice == 'day_copy' %}
      {{ setpoint | float }}
    {% elif night_set_point.active_choice == 'fixed' %}
      {{ night_set_point.fixed | float(24) }}
    {% else %}
      {{ states(night_set_point.external) | float(24) }}
    {% endif %}

triggers:
  - trigger: state
    entity_id: !input room_temperature_sensors
    id: room_temp_change

  - trigger: state
    entity_id: !input outside_temperature_sensors
    id: outside_temp_change

  - trigger: template
    value_template: |
      {% if day_set_point.active_choice == 'external' %}
        {{ states(day_set_point.external) }}
      {% else %}
        {{ false }}
      {% endif %}
    id: setpoint_change

  - trigger: template
    value_template: |
      {% if night_set_point.active_choice == 'external' %}
        {{ states(night_set_point.external) }}
      {% else %}
        {{ false }}
      {% endif %}
    id: setpoint_change

  - trigger: template
    value_template: |
      {% if occupation_sensor.active_choice == 'YES' %}
        {{ states(occupation_sensor.YES.entity) }}
      {% else %}
        {{ false }}
      {% endif %}
    id: presence_change

  - trigger: template
    value_template: |
      {% if windows_sensors.active_choice == 'YES' %}
        {{ expand(windows_sensors.YES.sensors) | map(attribute='state') | join('|') }}
      {% else %}
        {{ false }}
      {% endif %}
    id: window_change

  - trigger: state
    entity_id: !input hvac_entity
    id: hvac_config

  - trigger: template
    value_template: |
      {% if manual_trigger.active_choice == 'YES' %}
        {{ is_state(manual_trigger.YES, 'on') }}
      {% else %}
        {{ false }}
      {% endif %}
    id: manual

  - trigger: template
    value_template: |
      {% if daytime_auto_climate_enable.active_choice == 'YES' %}
        {{ is_state(daytime_auto_climate_enable.YES, 'on') }}
      {% else %}
        {{ false }}
      {% endif %}
    id: day_enable_on

  - trigger: template
    value_template: |
      {% if nighttime_auto_climate_enable.active_choice == 'YES' %}
        {{ is_state(nighttime_auto_climate_enable.YES, 'on') }}
      {% else %}
        {{ false }}
      {% endif %}
    id: night_enable_on

conditions:
  - condition: not
    conditions:
      - condition: state
        entity_id: !input hvac_entity
        state:
          - "unavailable"
          - "unknown"

actions:
  - variables:
      target_mode: "off"
      target_fan: "low"
      target_temp: 24

  # Routing choose (manual lock → presence → window → default climate)
  - choose:
      - conditions:
          - condition: and
            conditions:
              - condition: trigger
                id: hvac_config
              - condition: template
                value_template: "{{ manual_lock }}"
              - condition: template
                value_template: "{{ not room_unoccupied }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ occupation_sensor.active_choice == 'YES' }}"
            then:
              - wait_template: "{{ room_unoccupied }}"
                timeout:
                  hours: 4
                continue_on_timeout: true
            else:
              - delay:
                  hours: 4
      - conditions:
          - condition: template
            value_template: "{{ room_unoccupied }}"
        sequence:
          - variables:
              target_mode: "off"
      - conditions:
          - condition: template
            value_template: "{{ any_window_open }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ (outside_temp | float - setpoint | float) | abs <= 2 }}"
            then:
              - variables:
                  target_mode: "fan_only"
                  target_fan: "low"
                  target_temp: "{{ setpoint | float }}"
            else:
              - variables:
                  target_mode: "off"
    default:
      - if:
          - condition: template
            value_template: "{{ is_day }}"
        then:
          - condition: template
            value_template: "{{ daytime_auto_climate_enabled }}"
          - variables:
              target_temp: "{{ setpoint | float }}"
              target_mode: >-
                  {% set d = room_temp | float - setpoint | float %}
                  {% if d > 0.5 %}
                    cool
                  {% elif d < -0.5 %}
                    heat
                  {% else %}
                    auto
                  {% endif %}
              target_fan: >-
                  {% set d = room_temp | float - setpoint | float %}
                  {% if d > 4.0 %}
                    high
                  {% elif d >= 2.0 %}
                    medium
                  {% elif d < -4.0 %}
                    high
                  {% elif d <= -2.0 %}
                    medium
                  {% else %}
                    low
                  {% endif %}
        else:
          - condition: template
            value_template: "{{ nighttime_auto_climate_enabled }}"
          - variables:
              target_mode: >-
                  {% set d = forecast_temp | float - night_setpoint | float %}
                  {% if d > 2.0 %}
                    cool
                  {% elif d >= -2.0 %}
                    auto
                  {% else %}
                    heat
                  {% endif %}
              target_fan: "low"
              target_temp: "{{ night_setpoint | float }}"

  # Apply    
  - if:
      - condition: template
        value_template: >
          {% set ns = namespace(result=false) %}
          {% set hvac_list = hvac_entity %}
          {% for hvac_unit in hvac_entity %}
            {% if states(hvac_unit) != target_mode %}
              {% set ns.result = true %}
            {% elif states(hvac_unit) != "off" %}
              {% if state_attr(hvac_unit, 'fan_mode') != target_fan %}
                {% set ns.result = true %}
              {% endif %}
              {% if state_attr(hvac_unit, 'temperature') != target_temp %}
                {% set ns.result = true %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.result }}
    then:
      - action: climate.set_temperature
        target:
          entity_id: !input hvac_entity
        data:
          hvac_mode: "{{ target_mode }}"
          temperature: "{{ target_temp }}"
      # Set fan mode only if mode is not off, otherwise it may report error
      - if:
          - condition: template
            value_template: "{{ target_mode != 'off' }}"
        then:
          - action: climate.set_fan_mode
            target:
              entity_id: !input hvac_entity
            data:
              fan_mode: "{{ target_fan }}"
      - delay:
          seconds: 5
