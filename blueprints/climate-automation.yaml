blueprint:
  name: Simple Climate Control
  description: >
    Reactive day/night climate for one or more HVAC entities: daytime comfort bands (4 °C), nighttime mode from a forecast temperature, presence and window gating with a shared confirmation threshold, and a single idempotent apply per run.

    - **Day:** setpoint-driven cool/heat/auto and fan bands


    - **Night:** setpoint-driven cool/heat/auto and fan bands


    - **Triggers:** room and outdoor temperature, presence/windows, optional manual re-evaluation helper


    - **Optional:** day/night enable helpers
  domain: automation
  author: rftafas
  homeassistant:
    min_version: "2024.6.0"

  input:
    main_config:
      name: Main Configuration
      description: HVAC targets and optional manual re-evaluation.
      input:
        hvac_entity:
          name: HVAC Entity
          description: >
            One or more climate entities; each run applies the same mode, target temperature, and fan mode.
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain: climate

        manual_trigger:
          name: Manual trigger (optional)
          description: >
            Re-run climate logic from current state when a helper turns on.

            - **NO:** automatic triggers only


            - **YES:** `input_boolean`, `input_button`, or `binary_sensor` — ON forces a run
          default:
            active_choice: "NO"
          selector:
            choose:
              choices:
                "NO":
                  selector:
                    constant:
                      value: false
                      label: Automatic triggers only
                "YES":
                  selector:
                    entity:
                      filter:
                        - domain: binary_sensor
                        - domain: input_boolean
                        - domain: input_button

    temperature_config:
      name: Temperature sensors
      description: Indoor and outdoor sources, ventilation band, and forecast.
      input:
        room_temperature_sensors:
          name: Indoor temperature sensor
          description: >
            Used for daytime comfort bands and logic.

            - **Domain:** `sensor` only

            - **Multiple physical sensors?** Combine them with a template/statistics helper first, then point this at the helper.
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

        outside_temperature_sensors:
          name: Outdoor temperature sensor
          description: >
            Used for the window ventilation band (±2 °C from day setpoint).

            - **Domain:** `sensor` only

            - **Multiple physical sensors?** Combine them with a template/statistics helper first, then point this at the helper.
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

    presence_config:
      name: Presence
      description: Required occupation entity gating day/night climate and unoccupied shutoff.
      input:
        occupation_sensor:
          name: Room occupation sensor
          description: >
            Gates day/night climate and can turn HVAC off after the room stays unoccupied.
            Valid presence transitions only (`off`↔`on`), after the
            **Action detection threshold** (see Detection timing).
            Use an `input_boolean` left **on** if you do not want unoccupied shutoff.
          selector:
            entity:
              filter:
                - domain: binary_sensor
                  device_class:
                    - presence
                    - occupancy
                - domain: input_boolean

    windows_config:
      name: Windows and doors
      description: Opening sensors; ventilation band or off while open, day/night control resumes once closed.
      input:
        windows_sensors:
          name: Windows / doors
          description: >
            While any opening is confirmed open (see Detection timing), HVAC
            uses the ventilation band or off, and day/night logic is skipped
            until all are confirmed closed.

            Sensor convention: **off** = closed, **on** = open.

            No physical sensor? Use an `input_boolean` left permanently **off**
            (always "closed") — same trick as the occupation sensor.
          selector:
            entity:
              multiple: true
              filter:
                - domain: binary_sensor
                - domain: input_boolean

    threshold_config:
      name: Detection timing
      description: Global confirmation window applied to presence and window sensors.
      input:
        action_detection_threshold:
          name: Action detection threshold
          description: >
            How long a sensor must continuously hold a state before it's
            treated as confirmed — sustained presence/absence, and sustained
            window open/closed. Filters brief glitches and pass-throughs.
            Until a state is confirmed, the automation leaves HVAC unchanged.
          default:
            hours: 0
            minutes: 10
            seconds: 0
          selector:
            duration: {}

    day_config:
      name: Day
      description: Daytime enable, boundary, and setpoint.
      input:
        daytime_auto_climate_enable:
          name: Daytime enable helper (optional)
          description: >
            Gate daytime reactive logic without removing the automation.

            - **NO:** daytime climate always runs


            - **YES:** `input_boolean` or `binary_sensor` — when off, daytime bands are skipped and HVAC is left unchanged
          default:
            active_choice: "NO"
          selector:
            choose:
              choices:
                "NO":
                  selector:
                    constant:
                      value: false
                      label: Always enabled — no helper
                "YES":
                  selector:
                    entity:
                      filter:
                        - domain: binary_sensor
                        - domain: input_boolean

        day_boundary:
          name: Day boundary
          description: >
            When daytime begins (night ends). Independent of night boundary.

            - **sun:** sunrise (sun is above horizon)


            - **fixed:** clock time when day starts
          default:
            active_choice: "sun"
          selector:
            choose:
              choices:
                sun:
                  selector:
                    constant:
                      value: true
                      label: Sunrise
                fixed:
                  selector:
                    object:
                      fields:
                        time:
                          label: Day begins
                          selector:
                            time: {}

        day_set_point:
          name: Day setpoint
          description: >
            Target for daytime comfort bands and ventilation reference. External entity changes trigger re-evaluation.

            - **fixed:** slider (18–30 °C)


            - **external:** `input_number` entity
          default:
            active_choice: "fixed"
            fixed: 24
          selector:
            choose:
              choices:
                fixed:
                  selector:
                    number:
                      min: 18
                      max: 30
                      step: 0.5
                      unit_of_measurement: °C
                      mode: slider
                external:
                  selector:
                    entity:
                      filter:
                        domain: input_number

    night_config:
      name: Night
      description: Nighttime enable, boundary, and setpoint.
      input:
        nighttime_auto_climate_enable:
          name: Nighttime enable helper (optional)
          description: >
            Gate nighttime mode selection without removing the automation.

            - **NO:** nighttime climate always runs


            - **YES:** `input_boolean` or `binary_sensor` — when off, night logic is skipped and HVAC is left unchanged
          default:
            active_choice: "NO"
          selector:
            choose:
              choices:
                "NO":
                  selector:
                    constant:
                      value: false
                      label: Always enabled — no helper
                "YES":
                  selector:
                    entity:
                      filter:
                        - domain: binary_sensor
                        - domain: input_boolean

        night_boundary:
          name: Night boundary
          description: >
            When nighttime begins (day ends). Independent of day boundary.

            - **sun:** sunset (below horizon)


            - **fixed:** clock time when night starts
          default:
            active_choice: "sun"
          selector:
            choose:
              choices:
                sun:
                  selector:
                    constant:
                      value: true
                      label: Sunset
                fixed:
                  selector:
                    object:
                      fields:
                        time:
                          label: Night begins
                          selector:
                            time: {}

        night_set_point:
          name: Night setpoint
          description: >
            Compared to forecast temperature for nighttime cool / auto / heat. External entity changes trigger re-evaluation.

            - **day_copy:** use daytime setpoint


            - **fixed:** slider (18–30 °C)


            - **external:** temperature `sensor`, `number`, or `input_number`
          default:
            active_choice: "day_copy"
            fixed: 24
          selector:
            choose:
              choices:
                day_copy:
                  selector:
                    constant:
                      value: true
                      label: Day setpoint copy
                fixed:
                  selector:
                    number:
                      min: 18
                      max: 30
                      step: 0.5
                      unit_of_measurement: °C
                      mode: slider
                external:
                  selector:
                    entity:
                      filter:
                        - domain: sensor
                          device_class: temperature
                        - domain: number
                        - domain: input_number

mode: single
max_exceeded: silent

trigger_variables:
  day_set_point: !input day_set_point
  night_set_point: !input night_set_point
  manual_trigger: !input manual_trigger
  daytime_auto_climate_enable: !input daytime_auto_climate_enable
  nighttime_auto_climate_enable: !input nighttime_auto_climate_enable

variables:
  # Raw entities/config from inputs
  hvac_entity: !input hvac_entity
  room_temperature_sensors: !input room_temperature_sensors
  outside_temperature_sensors: !input outside_temperature_sensors
  day_set_point: !input day_set_point
  day_boundary: !input day_boundary
  night_boundary: !input night_boundary
  night_set_point: !input night_set_point
  daytime_auto_climate_enable: !input daytime_auto_climate_enable
  nighttime_auto_climate_enable: !input nighttime_auto_climate_enable

  # Current sensor readings
  room_temp: "{{ states(room_temperature_sensors) | float(0) }}"
  outside_temp: "{{ states(outside_temperature_sensors) | float(0) }}"

  # Enable-helper gates (no helper configured => always enabled)
  daytime_auto_climate_enabled: >
    {% if daytime_auto_climate_enable.active_choice == 'YES' %}
      {{ is_state(daytime_auto_climate_enable.YES, 'on') }}
    {% else %}
      {{ true }}
    {% endif %}
  nighttime_auto_climate_enabled: >
    {% if nighttime_auto_climate_enable.active_choice == 'YES' %}
      {{ is_state(nighttime_auto_climate_enable.YES, 'on') }}
    {% else %}
      {{ true }}
    {% endif %}

  # Day/night boundary and setpoint resolution
  is_day: >
    {% if day_boundary.active_choice == 'sun' %}
      {% set day_ok = is_state('sun.sun', 'above_horizon') %}
    {% else %}
      {% set day_ok = now() >= today_at(day_boundary.fixed.time) %}
    {% endif %}
    {% if night_boundary.active_choice == 'sun' %}
      {% set night_ok = is_state('sun.sun', 'above_horizon') %}
    {% else %}
      {% set night_ok = now() < today_at(night_boundary.fixed.time) %}
    {% endif %}
    {{ day_ok and night_ok }}
  day_setpoint: >
    {% if day_set_point.active_choice == 'fixed' %}
      {{ day_set_point.fixed | float(24) }}
    {% else %}
      {{ states(day_set_point.external) | float(24) }}
    {% endif %}
  night_setpoint: >
    {% if night_set_point.active_choice == 'day_copy' %}
      {{ day_setpoint | float }}
    {% elif night_set_point.active_choice == 'fixed' %}
      {{ night_set_point.fixed | float(24) }}
    {% else %}
      {{ states(night_set_point.external) | float(24) }}
    {% endif %}
  active_setpoint: >
    {% if is_day %}
      {{ day_setpoint | float }}
    {% else %}
      {{ night_setpoint | float }}
    {% endif %}

  # HVAC current state (first entity is master; others are ignored)
  current_mode: >
    {% set units = expand(hvac_entity) | list %}
    {{ units[0].state }}
  current_fan: >
    {% set units = expand(hvac_entity) | list %}
    {% set master_fan = units[0].attributes.fan_mode | default('low', true) %}
    {% if master_fan in ['low', 'medium', 'high'] %}
      {{ master_fan }}
    {% else %}
      low
    {% endif %}

  # Next computed target state
  next_mode: >-
    {% set ext_delta = outside_temp | float - active_setpoint | float %}
    {% set int_delta = room_temp | float - active_setpoint | float %}
    {% if current_mode == 'auto' %}
      {% if ext_delta > 0 %}
        {% if int_delta > 2 %}
          cool
        {% elif int_delta < -2 %}
          fan_only
        {% else %}
          auto
        {% endif %}
      {% else %}
        {% if int_delta > 2 %}
          fan_only
        {% elif int_delta < -2 %}
          heat
        {% else %}
          auto
        {% endif %}
      {% endif %}
    {% elif current_mode == 'cool' %}
      {% if int_delta < 2 %}
        auto
      {% elif ext_delta < -2 %}
        fan_only
      {% else %}
        cool
      {% endif %}
    {% elif current_mode == 'heat' %}
      {% if int_delta > -2 %}
        auto
      {% elif ext_delta > 2 %}
        fan_only
      {% else %}
        heat
      {% endif %}
    {% elif current_mode == 'fan_only' %}
      {% if ext_delta > -2 and int_delta > 2 %}
        cool
      {% elif ext_delta < 2 and int_delta < -2 %}
        heat
      {% elif -2 < int_delta and int_delta < 2 %}
        auto
      {% else %}
        fan_only
      {% endif %}
    {% else %}
      auto
    {% endif %}
  next_fan: >-
    {% if is_day %}
      {% set int_delta = room_temp | float - active_setpoint | float %}
      {% if current_fan == 'low' %}
        {% if int_delta > 4.0 %}
          high
        {% elif int_delta > 2.0 %}
          medium
        {% elif int_delta < -4.0 %}
          high
        {% elif int_delta < -2.0 %}
          medium
        {% else %}
          low
        {% endif %}
      {% elif current_fan == 'medium' %}
        {% if int_delta > 4.0 %}
          high
        {% elif int_delta > 2.0 %}
          medium
        {% elif int_delta < -4.0 %}
          high
        {% elif int_delta < -2.0 %}
          medium
        {% else %}
          low
        {% endif %}
      {% elif current_fan == 'high' %}
        {% if int_delta > 4.0 %}
          high
        {% elif int_delta > 2.0 %}
          medium
        {% elif int_delta < -4.0 %}
          high
        {% elif int_delta < -2.0 %}
          medium
        {% else %}
          low
        {% endif %}
      {% else %}
        low
      {% endif %}
    {% else %}
      low
    {% endif %}

triggers:
  - trigger: state
    entity_id: !input room_temperature_sensors
    id: room_temp_change

  - trigger: state
    entity_id: !input outside_temperature_sensors
    id: outside_temp_change

  - trigger: template
    value_template: |
      {% if day_set_point.active_choice == 'external' %}
        {{ states(day_set_point.external) }}
      {% else %}
        {{ false }}
      {% endif %}
    id: setpoint_change

  - trigger: template
    value_template: |
      {% if night_set_point.active_choice == 'external' %}
        {{ states(night_set_point.external) }}
      {% else %}
        {{ false }}
      {% endif %}
    id: setpoint_change

  - trigger: state
    entity_id: !input occupation_sensor
    from:
      - "off"
      - "on"
    to:
      - "on"
      - "off"
    for: !input action_detection_threshold
    id: presence_change

  - trigger: state
    entity_id: !input windows_sensors
    for: !input action_detection_threshold
    id: window_change

  - trigger: template
    value_template: |
      {% if manual_trigger.active_choice == 'YES' %}
        {{ is_state(manual_trigger.YES, 'on') }}
      {% else %}
        {{ false }}
      {% endif %}
    id: manual

  - trigger: template
    value_template: |
      {% if daytime_auto_climate_enable.active_choice == 'YES' %}
        {{ is_state(daytime_auto_climate_enable.YES, 'on') }}
      {% else %}
        {{ false }}
      {% endif %}
    id: day_enable_on

  - trigger: template
    value_template: |
      {% if nighttime_auto_climate_enable.active_choice == 'YES' %}
        {{ is_state(nighttime_auto_climate_enable.YES, 'on') }}
      {% else %}
        {{ false }}
      {% endif %}
    id: night_enable_on

conditions:
  - condition: not
    conditions:
      - condition: state
        entity_id: !input room_temperature_sensors
        state:
          - "unavailable"
          - "unknown"
  - condition: not
    conditions:
      - condition: state
        entity_id: !input outside_temperature_sensors
        state:
          - "unavailable"
          - "unknown"
  - condition: not
    conditions:
      - condition: state
        entity_id: !input occupation_sensor
        state:
          - "unavailable"
          - "unknown"
  - condition: not
    conditions:
      - condition: state
        entity_id: !input windows_sensors
        match: any
        state:
          - "unavailable"
          - "unknown"
  - condition: not
    conditions:
      - condition: state
        entity_id: !input hvac_entity
        match: any
        state:
          - "unavailable"
          - "unknown"

actions:
  - variables:
      target_mode: "off"
      target_fan: "low"
      target_temp: 24


  # Routing choose (confirmed-off → confirmed-open vent → confirmed-on+closed climate)
  # No default: any unconfirmed presence/window state leaves target_mode at its initialized "off".
  - choose:
      - conditions:
          - condition: state
            entity_id: !input occupation_sensor
            state: "off"
            for: !input action_detection_threshold
        sequence:
          - variables:
              target_mode: "off"
      - conditions:
          - condition: state
            entity_id: !input windows_sensors
            state: "on"
            match: any
            for: !input action_detection_threshold
        sequence:
          - if:
              - condition: template
                value_template: "{{ (outside_temp | float - active_setpoint | float) | abs <= 2 }}"
            then:
              - variables:
                  target_mode: "fan_only"
                  target_fan: "low"
            else:
              - variables:
                  target_mode: "off"
      - conditions:
          - condition: state
            entity_id: !input occupation_sensor
            state: "on"
            for: !input action_detection_threshold
          - condition: state
            entity_id: !input windows_sensors
            state: "off"
            match: all
            for: !input action_detection_threshold
        sequence:
          - if:
              - condition: template
                value_template: >
                  {% if is_day %}
                    {{ daytime_auto_climate_enabled }}
                  {% else %}
                    {{ nighttime_auto_climate_enabled }}
                  {% endif %}
            then:
              - variables:
                  target_temp: "{{ active_setpoint | float }}"
                  target_mode: "{{ next_mode }}"
                  target_fan: "{{ next_fan }}"

  # Apply
  - if:
      - condition: template
        value_template: >
          {% set ns = namespace(result=false) %}
          {% for hvac_unit in hvac_entity %}
            {% if states(hvac_unit) != target_mode %}
              {% set ns.result = true %}
            {% elif state_attr(hvac_unit, 'fan_mode') != target_fan %}
              {% if target_mode != "off" %}
                {% set ns.result = true %}
              {% endif %}
            {% elif state_attr(hvac_unit, 'temperature') != target_temp %}
              {% if target_mode not in ['off', 'fan_only'] %}
                {% set ns.result = true %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.result }}
    then:
      - if:
          - condition: template
            value_template: "{{ target_mode not in ['off', 'fan_only'] }}"
        then:
          - action: climate.set_temperature
            target:
              entity_id: !input hvac_entity
            data:
              hvac_mode: "{{ target_mode }}"
              temperature: "{{ target_temp }}"
        else:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input hvac_entity
            data:
              hvac_mode: "{{ target_mode }}"
      - if:
          - condition: template
            value_template: "{{ target_mode != 'off' }}"
        then:
          - action: climate.set_fan_mode
            target:
              entity_id: !input hvac_entity
            data:
              fan_mode: "{{ target_fan }}"
      - delay:
          seconds: 30
