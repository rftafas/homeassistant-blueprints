blueprint:
  name: Timed Light
  description: Sets a day and night timer to automatically turn off a light.
  domain: automation
  input:
    day_time_on:
      name: Day time active duration.
      selector:
        number:
          min: 0
          unit_of_measurement: seconds
          mode: slider
    night_time_on:
      name: Night time active duration.
      selector:
        number:
          min: 0
          unit_of_measurement: seconds
          mode: slider
    light_target:
      name: Light
      selector:
        entity:
          domain: light


triggers:
  - trigger: state
    entity_id: !input light_target
    from: "off"
    to: "on"
conditions: []
actions:
  - if:
      - condition: sun
        before: sunset
        after: sunrise
    then:
      - delay:
          hours: 0
          minutes: 0
          seconds: !input day_time_on
          milliseconds: 0
      - action: light.turn_off
        metadata: {}
        target:
          entity_id: !input light_target
        data: {}
    else:
      - delay:
          hours: 0
          minutes: 0
          seconds: !input night_time_on
          milliseconds: 0
      - action: light.turn_off
        metadata: {}
        target:
          entity_id: !input light_target
        data: {}
mode: restart